name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Sync version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version
          sed -i "s/export const VERSION = '.*'/export const VERSION = '$VERSION'/" src/core/constants.ts

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build
        run: node dist/index.cjs --version

      - name: Create npm tarball
        run: |
          npm pack
          cp byreal-cli-*.tgz byreal-cli.tgz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            byreal-cli-*.tgz
            byreal-cli.tgz
